<!DOCTYPE html>
<html>
<head>
    <title>Mouseover Dynamic Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>index.html

    <p class="instructions">
        Move your mouse over the input box to display the heading.
        Move your mouse away to hide it.
    </p>

    <h2 id="myHeading">Welcome to My Dynamic Page!</h2>
    
    <input 
        type="text"
        id="myInput"
        placeholder="Hover over me"
        onmouseover="showHeading()"
        onmouseout="hideHeading()"
    >
 
    <script src="script.js"></script>
</body>
</html>
